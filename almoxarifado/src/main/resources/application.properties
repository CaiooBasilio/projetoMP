spring.application.name=almoxarifado

# Configuração da conexão com o banco de dados
# bom primeiro preciso achar o banco de dados e gracas a uma das extenões de jdbc consigo fazer isso 
# para isso preciso "chamar" o jdbc:(e qual o banco que estou utilizando)://(onde ele esta hospedado):(a porta que ele ta utilizando)/(nome do banco)
spring.datasource.url=jdbc:mysql://localhost:3306/db_mp

# Credenciais de acesso ao banco de dados
spring.datasource.username=root
spring.datasource.password=

#  ela vai falar para o spring qual classe de driver jdbc usar para conectar ao mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ele basicamente ta pegando o comportamento do banco dde dados, ja criado e vai basicamente so validar e executar as ddl
# Define como o Hibernate vai lidar com o banco de dados:
# validate = apenas valida se as tabelas existentes estão compatíveis com as entidades
# (não cria nem altera nada no banco)
#Quando o sistema iniciar, verifica se as tabelas no banco de dados estão de acordo com as entidades Java
spring.jpa.hibernate.ddl-auto=validate

#Faz com que o Hibernate imprima no console os comandos SQL que estão sendo executados
# spring.jpa.show-sql=true

#Identa os comandos SQL para ficar mais legível
spring.jpa.properties.hibernate.format_sql=true

#faz isso para o spring entenda qual é a "linguagem" que esta sendo utilizada no banco 
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Define a estratégia de nomes físicos das tabelas/colunas
# Aqui mantém exatamente os nomes como foram definidos nas entidades (sem alterar para snake_case, etc.)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


