<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deletar Categoria</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --verde-escuro: #0a3d1f;
      --verde-claro: #2eb85c;
      --verde-neon: #39ff8a;
      --branco: #e8f5ec;
      --branco-suave: #c5dece;
      --vermelho: #ff4d4d;
      --vermelho-suave: #ff8080;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #051a0c 0%, #0d3320 30%, #1a6b3a 65%, #2eb85c 100%);
      font-family: 'Exo 2', sans-serif;
      color: var(--branco);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 440px; }

    .voltar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--branco-suave);
      text-decoration: none;
      font-size: 0.88rem;
      letter-spacing: 1px;
      margin-bottom: 24px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .voltar:hover { opacity: 1; }

    .card {
      background: rgba(10, 40, 20, 0.6);
      border: 1px solid rgba(255,77,77,0.2);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      padding: 36px 32px;
      animation: fadeUp 0.5s ease;
    }

    .icone-aviso {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 14px;
    }

    .card-titulo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--vermelho);
      text-shadow: 0 0 14px rgba(255,77,77,0.3);
      margin-bottom: 6px;
      text-align: center;
    }

    .card-subtitulo {
      font-size: 0.82rem;
      color: var(--branco-suave);
      opacity: 0.55;
      letter-spacing: 1px;
      margin-bottom: 30px;
      text-align: center;
    }

    .aviso-box {
      background: rgba(255,77,77,0.08);
      border: 1px solid rgba(255,77,77,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--vermelho-suave);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .campo { margin-bottom: 22px; }

    .campo label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--vermelho-suave);
      opacity: 0.9;
      margin-bottom: 8px;
      font-family: 'Rajdhani', sans-serif;
    }

    .campo input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,77,77,0.2);
      border-radius: 7px;
      color: var(--branco);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .campo input::placeholder { color: rgba(200,240,215,0.3); }
    .campo input:focus { border-color: var(--vermelho); background: rgba(255,255,255,0.09); }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--vermelho);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,77,77,0.3);
    }

    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Modal de confirmação */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .overlay.ativo { display: flex; animation: fadeIn 0.2s ease; }

    .modal {
      background: #0d2e18;
      border: 1px solid rgba(255,77,77,0.4);
      border-radius: 12px;
      padding: 32px 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    .modal h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem;
      color: var(--vermelho);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .modal p { font-size: 0.9rem; color: var(--branco-suave); margin-bottom: 24px; line-height: 1.5; }
    .modal p strong { color: var(--branco); }

    .modal-botoes { display: flex; gap: 12px; }

    .btn-confirmar {
      flex: 1;
      padding: 12px;
      background: var(--vermelho);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: filter 0.2s;
    }

    .btn-confirmar:hover { filter: brightness(1.15); }

    .btn-cancelar {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 7px;
      color: var(--branco-suave);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancelar:hover { background: rgba(255,255,255,0.07); }

    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 7px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.sucesso { background: rgba(57,255,138,0.1); border: 1px solid rgba(57,255,138,0.3); color: var(--verde-neon); display: block; }
    .msg.erro    { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: #ff9999; display: block; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>

<!-- Modal de confirmação -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>⚠ CONFIRMAR</h3>
    <p>Tem certeza que deseja deletar a categoria <strong id="nomeConfirm"></strong>? Esta ação não pode ser desfeita.</p>
    <div class="modal-botoes">
      <button class="btn-cancelar" id="btnCancelar">Cancelar</button>
      <button class="btn-confirmar" id="btnConfirmar">Deletar</button>
    </div>
  </div>
</div>

<div class="container">
  <a href="index.html" class="voltar">← Voltar para lista</a>

  <div class="card">
    <div class="icone-aviso">🗑️</div>
    <div class="card-titulo">Deletar</div>
    <div class="card-subtitulo">Remover categoria do almoxarifado</div>

    <div class="aviso-box">
      ⚠ Atenção: esta operação é irreversível. A categoria será removida permanentemente do banco de dados.
    </div>

    <div class="campo">
      <label>Nome da Categoria</label>
      <input type="text" id="nome" placeholder="Digite o nome exato da categoria"/>
    </div>

    <button class="btn-submit" id="btnDeletar">Deletar Categoria</button>

    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/categoria';

  document.getElementById('btnDeletar').addEventListener('click', () => {
    const nome = document.getElementById('nome').value.trim();
    const msg  = document.getElementById('msg');
    msg.className = 'msg';

    if (!nome) { msg.textContent = 'Digite o nome da categoria.'; msg.className = 'msg erro'; return; }

    document.getElementById('nomeConfirm').textContent = `"${nome}"`;
    document.getElementById('overlay').classList.add('ativo');
  });

  document.getElementById('btnCancelar').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('ativo');
  });

  document.getElementById('btnConfirmar').addEventListener('click', async () => {
    const nome = document.getElementById('nome').value.trim();
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('btnDeletar');

    document.getElementById('overlay').classList.remove('ativo');
    btn.disabled = true;
    btn.textContent = 'DELETANDO...';

    try {
      const res = await fetch(`${API}/${encodeURIComponent(nome)}`, { method: 'DELETE' });

      if (res.status === 204) {
        msg.textContent = `✔ Categoria "${nome}" deletada com sucesso.`;
        msg.className = 'msg sucesso';
        document.getElementById('nome').value = '';
      } else if (res.status === 404) {
        msg.textContent = '✖ Categoria não encontrada.';
        msg.className = 'msg erro';
      } else {
        msg.textContent = '✖ Erro ao deletar. Tente novamente.';
        msg.className = 'msg erro';
      }
    } catch {
      msg.textContent = '✖ Não foi possível conectar ao servidor.';
      msg.className = 'msg erro';
    }

    btn.disabled = false;
    btn.textContent = 'DELETAR CATEGORIA';
  });
</script>
</body>
</html>
