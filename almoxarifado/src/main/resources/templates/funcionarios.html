<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Funcionários — MP Metalúrgica</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="itens.html" class="header-logo">
    <div class="header-logo-icon">MP</div>
    <span class="header-logo-text">Almoxarifado</span>
  </a>
  <nav>
    <a href="itens.html"><span>📦 </span>Itens</a>
    <a href="categorias.html"><span>🗂 </span>Categorias</a>
    <a href="funcionarios.html" class="active"><span>👷 </span>Funcionários</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <div>
      <h1 class="page-title">Funcionários</h1>
      <p class="page-subtitle">GET /funcionarios &nbsp;|&nbsp; Almoxarifado MP Metalúrgica</p>
    </div>
    <button class="btn btn-primary" onclick="abrirModalNovo()">+ Novo Funcionário</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Contato</th>
          <th>Cargo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaFuncionarios">
        <tr>
          <td colspan="5">
            <div class="empty-state">
              <div class="empty-state-icon">👷</div>
              <div class="empty-state-text">Carregando funcionários...</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<!-- MODAL: Novo Funcionário -->
<div class="modal-overlay" id="modalNovo">
  <div class="modal">
    <div class="modal-titulo">Novo Funcionário</div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="novoNome" placeholder="Ex: João da Silva" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contato</label>
        <input type="tel" id="novoContato" placeholder="Ex: (34) 99999-0000" />
      </div>
      <div class="form-group">
        <label>Cargo</label>
        <input type="text" id="novoCargo" placeholder="Ex: Almoxarife" />
      </div>
    </div>
    <div class="modal-acoes">
      <button class="btn btn-outline" onclick="fecharModal('modalNovo')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarNovoFuncionario()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirmar Exclusão -->
<div class="modal-overlay" id="modalExcluir">
  <div class="modal">
    <div class="modal-titulo" style="border-top-color: var(--vermelho);">Confirmar Exclusão</div>
    <p style="font-size:0.88rem; color:var(--texto-leve); margin-bottom:0.5rem;">Deseja realmente excluir o funcionário:</p>
    <p style="font-weight:600; font-size:0.95rem;" id="excluirNomeDisplay"></p>
    <input type="hidden" id="excluirId" />
    <div class="modal-acoes">
      <button class="btn btn-outline" onclick="fecharModal('modalExcluir')">Cancelar</button>
      <button class="btn btn-vermelho" onclick="confirmarExclusao()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = 'http://localhost:8080';

  async function carregarFuncionarios() {
    try {
      const res = await fetch(`${API}/funcionarios`);
      const lista = await res.json();
      renderizarTabela(lista);
    } catch {
      mostrarToast('Erro ao conectar com a API', 'erro');
    }
  }

  function renderizarTabela(lista) {
    const tbody = document.getElementById('tabelaFuncionarios');
    if (!lista.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">Nenhum funcionário cadastrado</div>
      </div></td></tr>`;
      return;
    }
    tbody.innerHTML = lista.map(f => `
      <tr>
        <td class="text-mono" style="color:var(--texto-leve)">${f.id}</td>
        <td style="font-weight:500">${f.nomeFuncionario}</td>
        <td class="text-mono">${f.contato}</td>
        <td>${f.cargo ? `<span class="badge badge-azul">${f.cargo}</span>` : '<span class="text-muted">—</span>'}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-sm btn-vermelho" onclick="abrirModalExcluir(${f.id}, '${escapar(f.nomeFuncionario)}')">Excluir</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ========== NOVO ==========
  function abrirModalNovo() { abrirModal('modalNovo'); }

  async function salvarNovoFuncionario() {
    const nome    = document.getElementById('novoNome').value.trim();
    const contato = document.getElementById('novoContato').value.trim();
    const cargo   = document.getElementById('novoCargo').value.trim();

    if (!nome)    return mostrarToast('Nome é obrigatório', 'erro');
    if (!contato) return mostrarToast('Contato é obrigatório', 'erro');

    try {
      const res = await fetch(`${API}/funcionarios`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nomeFuncionario: nome, contato, cargo: cargo || null })
      });
      if (res.ok) {
        fecharModal('modalNovo');
        mostrarToast('Funcionário cadastrado com sucesso', 'sucesso');
        carregarFuncionarios();
        document.getElementById('novoNome').value = '';
        document.getElementById('novoContato').value = '';
        document.getElementById('novoCargo').value = '';
      } else {
        const err = await res.json();
        mostrarToast(err.mensagem ?? 'Erro ao cadastrar', 'erro');
      }
    } catch {
      mostrarToast('Erro na requisição', 'erro');
    }
  }

  // ========== EXCLUIR ==========
  function abrirModalExcluir(id, nome) {
    document.getElementById('excluirId').value = id;
    document.getElementById('excluirNomeDisplay').textContent = nome;
    abrirModal('modalExcluir');
}

  async function confirmarExclusao() {
    const id = document.getElementById('excluirId').value;
    try {
      const res = await fetch(`${API}/funcionarios/${id}`, { method: 'DELETE' });
      if (res.status === 204) {
        fecharModal('modalExcluir');
        mostrarToast('Funcionário excluído', 'sucesso');
        carregarFuncionarios();
      } else mostrarToast('Funcionário não encontrado', 'erro');
    } catch {
      mostrarToast('Erro na requisição', 'erro');
    }
  }

  function abrirModal(id) { document.getElementById(id).classList.add('open'); }
  function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
  function escapar(str) { return (str ?? '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

  function mostrarToast(msg, tipo = 'info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast toast-${tipo}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });

  window.addEventListener('load', carregarFuncionarios);
</script>
</body>
</html>
